<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Flower Directory Overview</title>

<style>
:root{
  --bg:#f7f6f2;
  --card:#ffffff;
  --primary:#8a2d5f;
  --primary-dark:#5f1d40;
  --accent:#d9c7cf;
  --text:#222;
  --muted:#666;
  --border:#ddd;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
}

header{
  background:#fff;
  border-bottom:1px solid var(--border);
  padding:28px 20px;
  text-align:center;
}

header h1{
  margin:0;
  font-size:2rem;
  color:var(--primary-dark);
}

header p{
  margin:10px auto 0;
  max-width:760px;
  color:var(--muted);
}

.wrapper{
  max-width:1400px;
  margin:auto;
  padding:24px;
}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:14px;
  margin-bottom:24px;
}

.search-box,
.jump-box{
  flex:1 1 260px;
}

label{
  display:block;
  font-size:.92rem;
  margin-bottom:6px;
  color:var(--primary-dark);
  font-weight:bold;
}

input,
select{
  width:100%;
  padding:11px 12px;
  border:1px solid var(--border);
  border-radius:8px;
  font-size:1rem;
  background:#fff;
}

.quick-nav{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:28px;
}

.quick-nav button{
  border:1px solid var(--border);
  background:#fff;
  padding:8px 10px;
  border-radius:7px;
  cursor:pointer;
  font-size:.92rem;
}

.quick-nav button:hover,
.quick-nav button:focus{
  background:var(--accent);
  outline:none;
}

.section{
  margin-bottom:34px;
}

.section h2{
  margin:0 0 14px;
  padding-bottom:8px;
  border-bottom:2px solid var(--accent);
  color:var(--primary-dark);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:14px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:14px;
}

.card a{
  color:var(--primary);
  text-decoration:none;
  font-weight:bold;
}

.card a:hover,
.card a:focus{
  text-decoration:underline;
}

.count{
  font-size:.9rem;
  color:var(--muted);
  margin-bottom:16px;
}

.hidden{
  display:none;
}

@media (max-width:700px){
  header h1{
    font-size:1.6rem;
  }
}
</style>
</head>
<body>

<header>
  <h1>Flower Directory Overview</h1>
  <p>
    Browse a large alphabetical collection of flower groups and popular flowering plants.
    Use search or jump to a letter to quickly explore.
  </p>
</header>

<main class="wrapper">

  <section class="controls" aria-label="Search controls">
    <div class="search-box">
      <label for="search">Search Flowers</label>
      <input id="search" type="text" placeholder="Type a flower name...">
    </div>

    <div class="jump-box">
      <label for="jump">Jump to Letter</label>
      <select id="jump">
        <option value="">Choose Letter</option>
      </select>
    </div>
  </section>

  <nav class="quick-nav" id="quickNav" aria-label="Alphabet navigation"></nav>

  <div class="count" id="resultCount"></div>

  <div id="directory"></div>

</main>

<script>
const flowers = [
"Anemone","Aster","Azalea",
"Begonia","Bellflower","Bird of Paradise","Black Eyed Susan","Bleeding Heart","Bluebell","Bougainvillea",
"Buttercup",
"Camellia","Carnation","Chamomile","Cherry Blossom","Chrysanthemum","Clematis","Columbine","Coneflower","Cosmos","Crocus",
"Daffodil","Dahlia","Daisy","Delphinium","Dogwood Flower",
"Echinacea","Edelweiss","Evening Primrose",
"Freesia","Fuchsia","Foxglove",
"Gardenia","Gaillardia","Geranium","Gladiolus","Goldenrod",
"Helenium","Heliotrope","Hibiscus","Hollyhock","Honeysuckle","Hyacinth","Hydrangea",
"Iberis","Iris",
"Jasmine","Jonquil",
"Kalanchoe",
"Lantana","Lavender","Lilac","Lily","Lily of the Valley","Lisianthus","Lotus","Lupine",
"Magnolia","Marigold","Morning Glory","Mums",
"Nasturtium","Nemesia",
"Orchid",
"Pansy","Passion Flower","Peony","Periwinkle","Petunia","Phlox","Poppy","Primrose",
"Queen Anne's Lace",
"Ranunculus","Rhododendron","Rose",
"Salvia","Snapdragon","Snowdrop","Spider Lily","Statice","Sunflower","Sweet Pea",
"Tansy","Thistle","Tiger Lily","Tulip",
"Verbena","Violet",
"Wallflower","Water Lily","Wisteria",
"Yarrow",
"Zinnia"
];

flowers.sort((a,b)=>a.localeCompare(b));

const directory = document.getElementById("directory");
const search = document.getElementById("search");
const jump = document.getElementById("jump");
const quickNav = document.getElementById("quickNav");
const resultCount = document.getElementById("resultCount");

function buildLetters(){
  const letters = [...new Set(flowers.map(f => f[0].toUpperCase()))];

  letters.forEach(letter=>{
    const option = document.createElement("option");
    option.value = letter;
    option.textContent = letter;
    jump.appendChild(option);

    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = letter;
    btn.addEventListener("click", ()=>scrollToLetter(letter));
    quickNav.appendChild(btn);
  });
}

function scrollToLetter(letter){
  const el = document.getElementById("section-" + letter);
  if(el){
    el.scrollIntoView({behavior:"smooth", block:"start"});
  }
}

function render(filter=""){
  directory.innerHTML = "";
  const grouped = {};
  let total = 0;

  flowers.forEach(name=>{
    if(name.toLowerCase().includes(filter.toLowerCase())){
      const letter = name[0].toUpperCase();
      if(!grouped[letter]) grouped[letter] = [];
      grouped[letter].push(name);
      total++;
    }
  });

  resultCount.textContent = total + " flower entries shown";

  Object.keys(grouped).sort().forEach(letter=>{
    const section = document.createElement("section");
    section.className = "section";
    section.id = "section-" + letter;

    const h2 = document.createElement("h2");
    h2.textContent = letter;
    section.appendChild(h2);

    const grid = document.createElement("div");
    grid.className = "grid";

    grouped[letter].forEach(name=>{
      const card = document.createElement("div");
      card.className = "card";

      const link = document.createElement("a");
      link.href = "/o/page?o=word&w=" + encodeURIComponent(name);
      link.textContent = name;

      card.appendChild(link);
      grid.appendChild(card);
    });

    section.appendChild(grid);
    directory.appendChild(section);
  });

  if(total === 0){
    directory.innerHTML = "<p>No flowers found.</p>";
  }
}

search.addEventListener("input", e=>{
  render(e.target.value);
});

jump.addEventListener("change", e=>{
  if(e.target.value){
    scrollToLetter(e.target.value);
  }
});

buildLetters();
render();
</script>

</body>
</html>
